<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quick Poll</title>

    
    <script src="/socket.io/socket.io.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #2e2a27;
        color: #e6e1dc;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        margin: auto;
        background: #3b3531;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
      }

      h1 {
        color: #d2a679;
      }

      input,
      button {
        padding: 10px;
        margin: 5px 0;
        border: none;
        border-radius: 5px;
      }

      input {
        width: 100%;
        background: #4a433e;
        color: white;
      }

      button {
        background: #8b5e3c;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #a06f47;
      }

      .option {
        background: #4a433e;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .votes {
        font-weight: bold;
        color: #d2a679;
      }

      .render-container {
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Quick Poll</h1>

      <!-- Create Poll -->
      <div class="render-container">
        <h3>Create Poll</h3>
        <input id="question" placeholder="Enter question" />
        <input id="opt1" placeholder="Option 1" />
        <input id="opt2" placeholder="Option 2" />
        <input id="opt3" placeholder="Option 3" />
        <button onclick="createPoll()">Create Poll</button>

        <!--  Share link UI -->
        <div id="shareBox" style="margin-top: 10px"></div>
      </div>

      <hr />
      <hr />

      <!-- Poll Display -->
      <div id="pollSection" class="render-container"></div>
    </div>

    <script>
      function getPollIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get("pollId");
      }

      const socket = io();

      let currentPollId = null;

      // create/get userId (persisted)
      let userId = localStorage.getItem("userId");
      if (!userId) {
        userId = crypto.randomUUID();
        localStorage.setItem("userId", userId);
      }

      async function createPoll() {
        const question = document.getElementById("question").value;
        const options = [
          document.getElementById("opt1").value,
          document.getElementById("opt2").value,
          document.getElementById("opt3").value,
        ].filter(Boolean);

        const res = await fetch("/api/poll", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, options }),
        });

        const data = await res.json();

        const shareLink = data.shareUrl;

        // Better UX instead of alert
        const shareBox = document.getElementById("shareBox");
        shareBox.innerHTML = `
      <p>Share this link:</p>
      <input value="${shareLink}" readonly onclick="this.select()" />
      <button onclick="copyLink('${shareLink}')">Copy</button>
    `;
      }

      function copyLink(link) {
        navigator.clipboard.writeText(link);
        alert("Link copied!");
      }

      window.onload = async () => {
        const pollId = getPollIdFromURL();

        if (!pollId) {
          console.log("No pollId in URL");
          return;
        }

        currentPollId = pollId;

        socket.emit("join_poll", pollId);

        const res = await fetch(`/api/poll/${pollId}`);
        const poll = await res.json();

        renderResults(poll);
      };

      function renderResults(poll) {
  const container = document.getElementById("pollSection");

  const totalVotes = poll.options.reduce(
    (sum, o) => sum + (o.votes || 0),
    0
  );

  container.innerHTML = `
    <h3>${poll.question}</h3>
    ${poll.options
      .map((opt) => {
        const votes = opt.votes || 0;
        const percent = totalVotes
          ? ((votes / totalVotes) * 100).toFixed(1)
          : 0;

        return `
          <div class="option">
            <div>${opt.text}</div>
            <div class="votes">${votes} votes (${percent}%)</div>
            <div class="bar" style="width:${percent}%"></div>
          </div>
        `;
      })
      .join("")}
  `;
}
