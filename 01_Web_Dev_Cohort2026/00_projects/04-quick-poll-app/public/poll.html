<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vote</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #2e2a27;
      color: #e6e1dc;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #3b3531;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    h2 {
      color: #d2a679;
    }

    .option {
      background: #4a433e;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
    }

    button {
      margin-top: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background: #8b5e3c;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #a06f47;
    }

    .bar {
      height: 8px;
      background: #8b5e3c;
      margin-top: 6px;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .votes {
      font-size: 14px;
      color: #d2a679;
    }

    .message {
      margin-top: 10px;
      color: #d2a679;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="question"></h2>

  <div id="options"></div>

  <div id="message" class="message"></div>
</div>

<script>
  const socket = io();

  const params = new URLSearchParams(window.location.search);
  const pollId = params.get("id");

  let hasVoted = localStorage.getItem(`voted_${pollId}`);

  // 🧠 persistent userId
  let userId = localStorage.getItem("userId");
  if (!userId) {
    userId = crypto.randomUUID();
    localStorage.setItem("userId", userId);
  }

  async function loadPoll() {
    const res = await fetch(`/api/poll/${pollId}`);
    const poll = await res.json();

    document.getElementById("question").innerText = poll.question;

    renderOptions(poll);
    socket.emit("join_poll", pollId);
  }

  function renderOptions(poll) {
    const container = document.getElementById("options");

    const totalVotes = poll.options.reduce((sum, o) => sum + (o.votes || 0), 0);

    container.innerHTML = poll.options.map(opt => {
      const votes = opt.votes || 0;
      const percent = totalVotes ? ((votes / totalVotes) * 100).toFixed(1) : 0;

      return `
        <div class="option">
          <div>${opt.text}</div>

          ${
            hasVoted
              ? `
                <div class="votes">${votes} votes (${percent}%)</div>
                <div class="bar" style="width:${percent}%"></div>
              `
              : `
                <button onclick="vote('${opt.id}')">Vote</button>
              `
          }
        </div>
      `;
    }).join("");

    // message
    const msg = document.getElementById("message");
    if (hasVoted) {
      msg.innerText = "✅ You have already voted. Showing results.";
    } else {
      msg.innerText = "";
    }
  }

  async function vote(optionId) {
    if (hasVoted) return;

    const res = await fetch(`/api/poll/${pollId}/vote`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ optionId, userId })
    });

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    localStorage.setItem(`voted_${pollId}`, "true");
    hasVoted = true;
  }

  socket.on("vote_update", (poll) => {
    renderOptions(poll);
  });

  loadPoll();
</script>

</body>
</html>
