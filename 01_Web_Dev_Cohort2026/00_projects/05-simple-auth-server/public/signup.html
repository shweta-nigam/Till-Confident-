<!DOCTYPE html>
<html>
<head>
  <title>Client App</title>
</head>
<body>

<h2>Test OAuth</h2>

<button onclick="login()">Login with Auth Server</button>

<script>
  function login() {
    const url = new URL("http://localhost:8080/o/authorize");

    url.searchParams.set("response_type", "code");
    url.searchParams.set("client_id", "YOUR_CLIENT_ID");
    url.searchParams.set("redirect_uri", "http://localhost:3000/callback");
    url.searchParams.set("state", "random123");

    window.location.href = url.toString();
  }
</script>

</body>
</html>
